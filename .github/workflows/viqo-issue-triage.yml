name: Viqo Issue Triage
on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  triage-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >-
      github.event_name == 'issues' ||
      (github.event_name == 'issue_comment' && !github.event.issue.pull_request && github.event.comment.user.type != 'Bot')
    concurrency:
      group: issue-triage-${{ github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      issues: write
      # Required to mint the OIDC token exchanged for a Viqo API access token (Workload Identity Federation)
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Viqo for Issue Triage
        timeout-minutes: 5
        uses: inferviqo/viqo-action@v1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          VIQO_CODE_SCRIPT_CAPS: '{"edit-issue-labels.sh":2}'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          allowed_non_write_users: "*"
          prompt: "/triage-issue REPO: ${{ github.repository }} ISSUE_NUMBER: ${{ github.event.issue.number }} EVENT: ${{ github.event_name }}"
          # Authenticate to the Viqo API via Workload Identity Federation
          # (the workflow's OIDC token is exchanged for a short-lived access
          # token) instead of a static API key.
          viqo_federation_rule_id: ${{ vars.VIQO_FEDERATION_RULE_ID }}
          viqo_organization_id: ${{ vars.VIQO_ORGANIZATION_ID }}
          viqo_service_account_id: ${{ vars.VIQO_SERVICE_ACCOUNT_ID }}
          viqo_workspace_id: ${{ vars.VIQO_WORKSPACE_ID }}
          viqo_args: |
            --model viqo-opus-4-6
